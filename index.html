<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="A small library for implementing simple landing pages using class components.">
        <title>EzLand.js</title>
        <link href="/src/styles/styles.css" rel="stylesheet" type="text/css"/> 
        <script defer src="/ezland.js"></script>
        <script defer src="/app.js"></script>
        <script defer src="/src/lib/alpine.js"></script>
    </head>
    <body>
        <div class="container">
            <!-- All attributes will be available inside the component. -->
            <ez-demo subtitle="EzLand.js Demo">
                <h1>Welcome</h1>
            </ez-demo>

            <!--
                Use the `loading="defer"` attribute so that the element loads only when it appears 
                on the screen as a result of an external component's actions.
            -->
            <ez-alpine-demo>
                <ez-demo subtitle="First demo component" loading="defer"></ez-demo>
                <ez-demo subtitle="Second demo component" loading="defer"></ez-demo>
                <ez-defer-demo loading="defer"></ez-defer-demo>
            </ez-alpine-demo>
        </div>
    </body>
</html>
